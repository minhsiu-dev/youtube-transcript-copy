<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Copy Transcript</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="w-80 p-4 bg-background text-foreground">
    <div class="space-y-4">
      <!-- Header -->
      <div class="flex items-center gap-2">
        <svg class="size-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="18" height="14" x="3" y="5" rx="2" ry="2"/>
          <path d="M7 15h4M15 15h2M7 11h2M13 11h4"/>
        </svg>
        <h1 class="text-sm font-semibold tracking-tight">Copy transcript</h1>
      </div>

      <!-- Language select -->
      <div class="space-y-1.5">
        <label for="lang" class="block text-xs font-medium text-muted-foreground">Language</label>
        <select id="lang"
          class="w-full h-9 px-3 rounded-md border border-input bg-background text-sm
                 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 focus:ring-offset-background
                 disabled:opacity-50 disabled:cursor-not-allowed"></select>
      </div>

      <!-- Format buttons -->
      <div class="flex flex-col gap-2">
        <button id="btn-plain" type="button" class="btn-primary">
          <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9" x2="15" y1="20" y2="20"/>
            <line x1="12" x2="12" y1="4" y2="20"/>
          </svg>
          Plain text
        </button>
        <button id="btn-timestamped" type="button" class="btn-secondary">
          <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          With timestamps
        </button>
        <button id="btn-header" type="button" class="btn-secondary">
          <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            <path d="M10 9H8"/>
            <path d="M16 13H8"/>
            <path d="M16 17H8"/>
          </svg>
          Plain + title/URL
        </button>
      </div>

      <!-- Status -->
      <div id="status" class="flex items-center gap-2 text-xs min-h-4 text-muted-foreground" role="status" aria-live="polite">
        <svg id="status-spinner" class="size-3.5 animate-spin hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span id="status-text"></span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
